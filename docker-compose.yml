services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - docker/.env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mes-network

  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${BACKEND_PYTHON_IMAGE:-python:3.12-slim}
    ports:
      - "8010:8010"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: mes
      POSTGRES_USER: mes
      POSTGRES_PASSWORD: mes
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          urllib.request.urlopen("http://127.0.0.1:8010/openapi.json")
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - mes-network

  frontend:
    build:
      context: ./frontend
      args:
        NODE_IMAGE: ${FRONTEND_NODE_IMAGE:-node:20-alpine}
        NGINX_IMAGE: ${FRONTEND_NGINX_IMAGE:-nginx:alpine}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mes-network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    profiles:
      - dev-tools
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8978:8978"
    environment:
      CLOUDBEAVER_WEB_SERVER_PORT: 8978
      CLOUDBEAVER_APP_ANONYMOUS_ACCESS_ENABLED: "false"
      CLOUDBEAVER_APP_SUPPORTS_CUSTOM_CONNECTIONS: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8978/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - mes-network

networks:
  mes-network:
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: docker_postgres_data